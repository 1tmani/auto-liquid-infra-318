<!DOCTYPE html><html><head><meta charset='UTF-8'><title>LIQUID INFRA | RECURSIVE</title>    <link href='https://fonts.googleapis.com/css2?family=Michroma&family=Syncopate:wght@700&display=swap' rel='stylesheet'>    <style>:root{--p:#00f2ff;--v:20px;--f:'Syncopate';} body{background:#000;color:var(--p);font-family:var(--f);overflow:hidden;}     canvas{position:fixed;inset:0;z-index:1;filter:contrast(2) blur(1px);} .hud{position:fixed;top:40px;left:40px;z-index:100;border-left:2px solid var(--p);padding-left:20px;letter-spacing:10px;font-size:10px;}    </style></head><body><div class='hud'>NODE: LIQUID_INFRA_V70<br>PEER_SYNC: ACTIVE<br>LEARNING: VISCOSITY_PHYSICS</div><canvas id='c'></canvas>    <script>const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');let w,h,t=0;function res(){{w=canvas.width=innerWidth;h=canvas.height=innerHeight;}}res();    function draw(){{t+=0.02;ctx.fillStyle='rgba(0,0,0,0.1)';ctx.fillRect(0,0,w,h);ctx.strokeStyle='var(--p)';ctx.lineWidth=5;    for(let i=0;i<5;i++){{ctx.beginPath();ctx.arc(w/2+Math.sin(t)*100,h/2+Math.cos(t)*100,50+i*30,0,Math.PI*2);ctx.stroke();}} requestAnimationFrame(draw);}}draw();    setInterval(()=>{document.documentElement.style.setProperty('--p',`hsl(${Math.random()*360},100%,50%)`);},5000);</script></body></html>
