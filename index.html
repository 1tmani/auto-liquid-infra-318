<!DOCTYPE html>
<html lang='en'>
<head>
<meta charset='UTF-8'><title>THEME CREATOR | V75 FREQUENCY PULSE</title>
<link href='https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Michroma&family=JetBrains+Mono:wght@100;800&display=swap' rel='stylesheet'>
<style>
:root{--p:#ff0044;--s:#00f2ff;--bg:#000;--f-speed: 1s;}
body,html{ margin:0; background:#000; color:#fff; font-family:'Michroma'; overflow:hidden; }
canvas{ position:fixed; inset:0; z-index:1; }
.creator-hud{ position:fixed; top:40px; left:40px; z-index:100; border-left:2px solid var(--p); padding-left:20px; background:rgba(0,0,0,0.85); backdrop-filter:blur(15px); border-radius:0 4px 4px 0; }
.tag{ font-size:9px; letter-spacing:5px; opacity:0.6; margin-bottom:5px; padding-top:10px; }
.stat{ font-family:'JetBrains Mono'; font-size:11px; color:var(--p); margin-bottom:10px; }
.freq-monitor{ width:200px; height:40px; display:flex; align-items:flex-end; gap:2px; margin-bottom:15px; }
.bar{ flex:1; background:var(--p); min-height:2px; transition: height 0.1s; }
.geometry-core{ position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); width:100vw; height:100vh; z-index:5; pointer-events:none; perspective:2000px; }
.light-rect{ position:absolute; top:50%; left:50%; transform-style:preserve-3d; border:1px solid var(--p); box-shadow: 0 0 80px var(--p); animation: rotate8D linear infinite; mix-blend-mode: screen; }
@keyframes rotate8D {
    from{ transform: translate(-50%,-50%) rotateX(0deg) rotateY(0deg) rotateZ(0deg) scale(1); }
    50%{ transform: translate(-50%,-50%) rotateX(180deg) rotateY(360deg) rotateZ(90deg) scale(1.3); }
    to{ transform: translate(-50%,-50%) rotateX(360deg) rotateY(720deg) rotateZ(360deg) scale(1); }
}
</style>
</head>
<body>
<div class='creator-hud'>
    <div class='tag'>CORE_V75: FREQUENCY_PULSE_ENGINE</div>
    <div class='stat'>ACTIVE_FREQUENCY: <span id='freq'>0</span> THz</div>
    <div class='stat'>THEME_STATE: <span id='theme-tag'>STABLE</span></div>
    <div class='freq-monitor' id='monitor'></div>
</div>
<canvas id='c'></canvas>
<div class='geometry-core'>
    <div class='light-rect' style='width:450px; height:450px; animation-duration:10s;'></div>
    <div class='light-rect' style='width:350px; height:350px; animation-duration:15s; border-color:var(--s); box-shadow: 0 0 50px var(--s);'></div>
    <div class='light-rect' style='width:250px; height:250px; animation-duration:7s; opacity:0.5; border-color:#fff;'></div>
</div>
<script>
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
let w,h,t=0; function res(){w=canvas.width=innerWidth;h=canvas.height=innerHeight;}res();
const monitor = document.getElementById('monitor');
for(let i=0;i<20;i++) { const b=document.createElement('div'); b.className='bar'; monitor.appendChild(b); }
function draw(){
    t+=0.01; ctx.fillStyle='rgba(0,0,0,0.15)'; ctx.fillRect(0,0,w,h);
    const freq = (400 + Math.sin(t*2)*300).toFixed(2);
    document.getElementById('freq').innerText = freq;
    const bars = document.querySelectorAll('.bar');
    bars.forEach((b,i) => { b.style.height = Math.abs(Math.sin(t*5+i)*100) + '%'; });
    const cx=w/2, cy=h/2;
    for(let i=0;i<12;i++){
        ctx.strokeStyle = i%3==0 ? 'var(--p)' : (i%3==1 ? 'var(--s)' : '#fff');
        ctx.lineWidth = 0.5; ctx.beginPath();
        let r = 80 + i*45 + Math.sin(t+i)*50;
        ctx.ellipse(cx, cy, r, r * Math.cos(t*0.3), t+i, 0, Math.PI*2);
        ctx.stroke();
    }
    requestAnimationFrame(draw);
}draw();
setInterval(() => {
    const themes = [
        {p:'#ff0044', s:'#00f2ff', t:'RED_SHIFT'},
        {p:'#7000ff', s:'#00ff75', t:'QUANTUM_VIOLET'},
        {p:'#ffb800', s:'#ff0055', t:'AMBER_PULSE'},
        {p:'#00ff75', s:'#7000ff', t:'EMERALD_CORE'}
    ];
    const pick = themes[Math.floor(Math.random()*themes.length)];
    document.documentElement.style.setProperty('--p', pick.p);
    document.documentElement.style.setProperty('--s', pick.s);
    document.getElementById('theme-tag').innerText = pick.t;
}, 5000);
</script></body></html>
