<!DOCTYPE html>
<html lang='en'>
<head>
<meta charset='UTF-8'><title>THEME CREATOR | 8D LIGHT INFRA</title>
<link href='https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Michroma&family=JetBrains+Mono:wght@100&display=swap' rel='stylesheet'>
<style>
:root{--p:#ff0044;--s:#00f2ff;--bg:#000;}
body,html{ margin:0; background:#000; color:#fff; font-family:'Michroma'; overflow:hidden; }
canvas{ position:fixed; inset:0; z-index:1; }
.creator-hud{ position:fixed; top:40px; left:40px; z-index:100; border-left:2px solid var(--p); padding-left:20px; background:rgba(0,0,0,0.8); backdrop-filter:blur(10px); }
.tag{ font-size:9px; letter-spacing:5px; opacity:0.6; margin-bottom:5px; }
.stat{ font-family:'JetBrains Mono'; font-size:11px; color:var(--p); margin-bottom:10px; }
.geometry-core{ position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); width:100vw; height:100vh; z-index:5; pointer-events:none; perspective:1500px; }
.light-rect{ position:absolute; top:50%; left:50%; transform-style:preserve-3d; border:1px solid var(--p); box-shadow: 0 0 60px var(--p), inset 0 0 20px var(--p); animation: rotate8D linear infinite; }
@keyframes rotate8D {
    from{ transform: translate(-50%,-50%) rotateX(0deg) rotateY(0deg) rotateZ(0deg) scale(1); }
    50%{ transform: translate(-50%,-50%) rotateX(180deg) rotateY(360deg) rotateZ(90deg) scale(1.2); opacity:0.5; }
    to{ transform: translate(-50%,-50%) rotateX(360deg) rotateY(720deg) rotateZ(360deg) scale(1); }
}
</style>
</head>
<body>
<div class='creator-hud'>
    <div class='tag'>DESIGN_ENGINE: V74_THEME_CREATOR</div>
    <div class='stat'>DIMENSION: 8D_ACTIVE</div>
    <div class='stat'>LIGHT_FREQ: <span id='freq'>0</span> THz</div>
    <div class='stat'>MODE: RECURSIVE_THEME_GENERATION</div>
</div>
<canvas id='c'></canvas>
<div class='geometry-core'>
    <div class='light-rect' style='width:400px; height:400px; animation-duration:12s;'></div>
    <div class='light-rect' style='width:300px; height:300px; animation-duration:18s; border-color:var(--s); box-shadow: 0 0 40px var(--s);'></div>
    <div class='light-rect' style='width:200px; height:200px; animation-duration:8s; opacity:0.4;'></div>
</div>
<script>
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
let w,h,t=0; function res(){w=canvas.width=innerWidth;h=canvas.height=innerHeight;}res();
function draw(){
    t+=0.01; ctx.fillStyle='rgba(0,0,0,0.1)'; ctx.fillRect(0,0,w,h);
    document.getElementById('freq').innerText = (500 + Math.sin(t)*200).toFixed(2);
    const cx=w/2, cy=h/2;
    for(let i=0;i<8;i++){
        ctx.strokeStyle = i%2==0 ? 'var(--p)' : 'var(--s)';
        ctx.lineWidth = 0.5;
        ctx.beginPath();
        let r = 100 + i*50 + Math.sin(t+i)*40;
        ctx.ellipse(cx, cy, r, r * Math.cos(t*0.5), t+i, 0, Math.PI*2);
        ctx.stroke();
    }
    requestAnimationFrame(draw);
}draw();
</script></body></html>
